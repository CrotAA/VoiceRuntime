<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceRuntime</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell" data-mode="text">
      <header class="topbar">
        <div class="brand-block">
          <p class="brand">VoiceRuntime</p>
          <p class="brand-subtitle">Local chat runtime</p>
        </div>
        <div class="topbar-actions">
          <div class="health-badge" id="healthBadge">Checking...</div>
          <button id="clearButton" class="ghost-button" type="button">New chat</button>
        </div>
      </header>

      <div class="toolbar">
        <div class="mode-switch" role="tablist" aria-label="Mode">
          <button class="mode-button is-active" id="textModeButton" type="button">文本</button>
          <button class="mode-button" id="voiceModeButton" type="button">语音</button>
        </div>

        <label class="toolbar-toggle">
          <input id="enableThinkingInput" type="checkbox" checked />
          <span>思考模式</span>
        </label>

        <label class="toolbar-toggle">
          <input id="hideThinkingInput" type="checkbox" checked />
          <span>隐藏思考</span>
        </label>

        <label class="toolbar-toggle">
          <input id="renderMarkdownInput" type="checkbox" checked />
          <span>Markdown</span>
        </label>

        <label class="toolbar-toggle">
          <input id="autoSpeakInput" type="checkbox" checked />
          <span>自动播报</span>
        </label>

        <details class="settings">
          <summary>设置</summary>
          <div class="settings-panel">
            <div class="settings-header">
              <h2>Runtime</h2>
              <button id="pingButton" class="ghost-button" type="button">检查</button>
            </div>

            <label class="field">
              <span>Base URL</span>
              <input id="baseUrlInput" type="text" placeholder="留空时使用服务端默认值" />
            </label>

            <label class="field">
              <span>Model</span>
              <input id="modelInput" type="text" placeholder="留空时使用服务端默认模型" />
            </label>

            <label class="field">
              <span>System Prompt</span>
              <textarea id="systemPromptInput" rows="4"></textarea>
            </label>

            <div class="metrics">
              <label class="field">
                <span>Temperature</span>
                <input
                  id="temperatureInput"
                  type="number"
                  min="0"
                  max="2"
                  step="0.1"
                  value="0.7"
                />
              </label>

              <label class="field">
                <span>Max Tokens</span>
                <input id="maxTokensInput" type="number" min="1" step="1" value="4096" />
              </label>
            </div>
          </div>
        </details>
      </div>

      <main class="chat-panel">
        <div id="messages" class="messages" aria-live="polite"></div>

        <section id="voicePanel" class="voice-panel">
          <div class="voice-card">
            <p class="voice-label">Voice Mode</p>
            <div class="voice-submode-switch" role="tablist" aria-label="Voice Interaction Mode">
              <button class="mode-button is-active" id="manualVoiceButton" type="button">手动</button>
              <button class="mode-button" id="wakeVoiceButton" type="button">唤醒</button>
            </div>
            <p class="voice-hint" id="voiceHint">按住说话，或点击开始说话。</p>
            <div id="voiceStatus" class="voice-status">待命</div>
            <div id="voiceTranscript" class="voice-transcript">
              按住说话，或点击开始说话。
            </div>
            <div class="voice-actions voice-actions-manual">
              <button id="holdToTalkButton" class="secondary-button" type="button">按住说话</button>
              <button id="toggleRecordingButton" class="primary-button" type="button">
                点击开始说话
              </button>
            </div>
            <div class="voice-actions voice-actions-wake">
              <button id="wakeListeningButton" class="primary-button" type="button">开始待命</button>
            </div>
          </div>
        </section>

        <form id="chatForm" class="composer">
          <div class="composer-box">
            <textarea
              id="promptInput"
              rows="1"
              placeholder="给 VoiceRuntime 发送消息"
            ></textarea>
            <div class="composer-footer">
              <div class="stream-indicator" id="streamIndicator">Idle</div>
              <button id="sendButton" class="primary-button" type="submit">发送</button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <template id="messageTemplate">
      <article class="message">
        <div class="message-role"></div>
        <div class="message-content"></div>
      </article>
    </template>

    <script src="/config.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
